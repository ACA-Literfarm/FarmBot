name: CI en feature/MPV-github-actions

on:
  push:
    branches: [ feature/MPV-github-actions ]
  pull_request:
    branches: [ feature/MPV-github-actions ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-html
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests with HTML report
      run: |
        PYTHONPATH=$(pwd) pytest -v --html=report.html --self-contained-html

    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: pytest-report
        path: report.html
