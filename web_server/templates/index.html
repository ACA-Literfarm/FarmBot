<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteFarm - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <!-- Logo de LiteFarm con ícono de Telegram -->
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="LiteFarm Logo" class="main-logo">
                <div class="telegram-logo">
                    <i class="fab fa-telegram"></i>
                </div>
            </div>

            <!-- Mensajes de estado (ocultos por defecto) -->
            <div id="success-message" class="status-message success-message hidden">
                <i class="fas fa-check-circle"></i>
                Inicio de sesión exitoso. Puedes regresar a Telegram.
            </div>
            
            <div id="error-message" class="status-message error-message hidden">
                <i class="fas fa-exclamation-circle"></i>
                Error al iniciar sesión. Por favor, intenta nuevamente.
            </div>

            <!-- Botones de inicio de sesión -->
            <div class="login-options">
                <!-- Botón de Google -->
                <a href="{{ url_for('oauth2_authorize', provider='google') }}">
                    <button class="google-btn" id="google-login">
                            <img src="{{ url_for('static', filename='images/Google__G__logo.svg') }}" alt="Google Logo">
                            Continuar con Google
                    </button>
                </a>

                <!-- Separador -->
                <div class="divider">
                    <span>o</span>
                </div>

                <!-- Formulario de correo y contraseña -->
                <form id="email-login-form" class="email-form">
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>
                        <div class="password-toggle">
                            <i class="far fa-eye" id="toggle-password"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">Iniciar sesión</button>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
